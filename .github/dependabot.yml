version: 2
updates:

- package-ecosystem: nuget
  directory: "/"
  schedule:
    interval: weekly
  cooldown:
    default-days: 7

- package-ecosystem: "docker-compose"
  directory: "/"
  schedule:
    interval: quarterly
  ignore:
    - dependency-name: "elasticsearch/elasticsearch"
      versions:
        - "<8.0.0"
        - ">=9.0.0"
    - dependency-name: "kibana/kibana"
      versions:
        - "<8.0.0"
        - ">=9.0.0"
